<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .monogram {
      fill: none;
      stroke: #000000;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      .monogram {
        stroke: #ffffff;
      }
    }
  </style>
  <!-- Geometric 'D' on the left -->
  <path class="monogram" d="M7 6h6a10 10 0 0 1 0 20H7V6z" />
  <!-- Geometric 'J' on the right -->
  <path class="monogram" d="M22 6v14a6 6 0 0 1-6 6h-1" />
</svg>
